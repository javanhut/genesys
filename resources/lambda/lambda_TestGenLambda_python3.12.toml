[metadata]
  name = "TestGenLambda"
  runtime = "python3.12"
  handler = "lambda_function.lambda_handler"
  description = "Lambda function TestGenLambda created with Genesys"

[build]
  source_path = "/home/javanhut/TestLambdaCode"
  build_method = "podman"
  layer_auto = true
  requirements_file = "requirements.txt"

[function]
  memory_mb = 1024
  timeout_seconds = 30

[deployment]
  function_url = true
  cors_enabled = true
  auth_type = "AWS_IAM"
  architecture = "arm64"

[layer]
  name = "TestGenLambda-deps-arm64"
  description = "Dependencies for TestGenLambda Lambda function (arm64)"
  compatible_runtimes = ["python3.12"]

[iam]
  role_name = "genesys-lambda-TestGenLambda"
  role_arn = "arn:aws:iam::859885917020:role/genesys-lambda-TestGenLambda"
  required_policies = ["Basic CloudWatch Logs access"]
  auto_manage = true
  auto_cleanup = true
  managed_by = "genesys"
