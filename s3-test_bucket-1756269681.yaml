provider: aws
region: us-east-1
resources:
    storage:
        - name: test-bucket-genesys-demo
          type: bucket
          versioning: false
          encryption: true
          public_access: false
          tags:
            Environment: development
            ManagedBy: Genesys
            Purpose: demo
policies:
    require_encryption: true
    no_public_buckets: true
    require_tags:
        - ManagedBy
        - Purpose
        - Environment
